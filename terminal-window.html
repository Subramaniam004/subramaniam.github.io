<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Subbu Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="terminal-window-page">
  <div class="terminal-popup terminal-popup-expanded" role="document">
    <div class="terminal-popup-header">
      <div class="terminal-popup-traffic">
        <span class="terminal-popup-btn terminal-popup-close" data-action="close" aria-label="Close terminal"></span>
        <span class="terminal-popup-btn terminal-popup-minimize" data-action="minimize" aria-label="Minimize terminal"></span>
        <span class="terminal-popup-btn terminal-popup-expand terminal-popup-expand-active" data-action="expand" aria-label="Expand terminal"></span>
      </div>
      <span class="terminal-popup-title">subbu@portfolio</span>
      <div class="terminal-popup-spacer"></div>
    </div>
    <div class="terminal-body" id="window-terminal-body">
      <div class="terminal-output" id="window-terminal-output"></div>
      <div class="terminal-input-line">
        <span class="terminal-prompt">$</span>
        <span class="terminal-cursor" id="window-terminal-cursor"></span>
        <span class="terminal-input" id="window-terminal-input" contenteditable="true" spellcheck="false" data-placeholder="Type a command..."></span>
      </div>
    </div>
  </div>

  <script src="js/terminal-window.js"></script>
</body>
</html>
